# CWFire - Конфигурация плагина
# Версия: 1.0.0

# Язык плагина (ru, en)
language: ru

# Настройки автосохранения
auto-save:
  enabled: true
  # Интервал автосохранения в секундах
  interval: 300

# Настройки устройств
devices:
  # Радиус, в котором игрок может взаимодействовать с устройством
  interaction-radius: 5.0
  # Максимальное количество устройств на одно здание
  max-per-building: 256
  # Задержка перед срабатыванием тревоги (тиков)
  alarm-delay: 20

# Настройки сирены
siren:
  # Громкость звука (0.0 - 1.0)
  volume: 1.0
  # Высота звука (0.5 - 2.0)
  pitch: 1.0
  # Радиус слышимости в блоках
  sound-radius: 32
  # Интервал повторения звука (тиков)
  sound-interval: 60

# Настройки речевого оповещателя
voice-announcer:
  # Громкость
  volume: 1.0
  # Высота тона
  pitch: 0.9
  # Радиус слышимости
  sound-radius: 48
  # Текст сообщения (выводится в чат игрокам рядом)
  message: "&cВНИМАНИЕ! ПОЖАРНАЯ ТРЕВОГА! Немедленно покиньте здание!"

# Настройки табло «Выход»
exit-sign:
  # Цвет свечения (GREEN, RED, YELLOW)
  normal-color: GREEN
  # Цвет при тревоге
  alarm-color: RED
  # Мигание при тревоге
  blink-on-alarm: true
  # Интервал мигания (тиков)
  blink-interval: 10

# Настройки пожарной панели
panel:
  # Автоматический сброс тревоги после (секунды, 0 = не сбрасывать)
  auto-reset: 0
  # Задержка между сигналами (тиков)
  signal-delay: 5

# Настройки кабеля
cable:
  # Максимальная длина кабеля (блоков)
  max-length: 100
  # Цвет частиц кабеля
  particle-color: RED

# Настройки GUI
gui:
  # Заголовок основного GUI
  main-title: "&8[&cCWFire&8] &7Панель управления"
  panel-title: "&8[&cCWFire&8] &7Пожарная панель"
  device-list-title: "&8[&cCWFire&8] &7Список устройств"
  building-list-title: "&8[&cCWFire&8] &7Список зданий"
  link-title: "&8[&cCWFire&8] &7Связи устройства"

# Настройки частиц для отображения связей
link-particles:
  enabled: true
  # Интервал обновления (тиков)
  update-interval: 5
